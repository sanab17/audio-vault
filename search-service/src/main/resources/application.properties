# Server Configuration
server.port=8082

# Application Name
spring.application.name=search-service

# MongoDB Configuration
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=audiovault_search
spring.data.mongodb.username=admin
spring.data.mongodb.password=admin123
spring.data.mongodb.authentication-database=admin

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092

# Kafka Consumer Configuration
spring.kafka.consumer.group-id=search-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Kafka Topics
kafka.topics.recording-created=recording.created
kafka.topics.recording-updated=recording.updated
kafka.topics.recording-deleted=recording.deleted

# Logging Configuration
logging.level.com.audiovault.search=INFO
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.org.springframework.kafka=INFO